<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Cloudflare Worker</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: Arial; padding: 40px; }
        button { padding: 16px 32px; font-size: 20px; background: #3b82f6; border: none; border-radius: 12px; color: #fff; cursor: pointer; }
        #result { margin-top: 30px; background: #1f2937; padding: 20px; border-radius: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🧪 Тест Cloudflare Worker</h1>
    <button onclick="testWorker()">Отправить тестовый запрос</button>
    <div id="result">Нажмите кнопку, чтобы проверить...</div>

    <script>
        async function testWorker() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Отправка запроса к Worker...';

            try {
                // ВАЖНО: замените URL на адрес вашего Worker, если он отличается
                const workerUrl = 'https://yookassa.wisebor.workers.dev/';

                const response = await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: 100,
                        description: 'Тестовый платёж',
                        returnUrl: 'https://borisov.store/'
                    })
                });

                const data = await response.json();

                if (data.success && data.paymentUrl) {
                    resultDiv.innerHTML = `✅ Worker работает!<br><br>
                    Ссылка на оплату (тест):<br>
                    <a href="${data.paymentUrl}" target="_blank" style="color: #3b82f6;">${data.paymentUrl}</a><br><br>
                    Ответ от Worker:<br>${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `❌ Worker вернул ошибку:<br><br>${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Ошибка при запросе к Worker:<br><br>${error.message}`;
            }
        }
    </script>
</body>
</html>
